version: 2

project_name: baseten

before:
  hooks:
    - go mod tidy

builds:
  - id: baseten
    main: ./cmd/baseten
    binary: baseten
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/basetenlabs/baseten-cli/internal/cmd.Version={{.Version}}

archives:
  - id: baseten
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  github:
    owner: basetenlabs
    name: baseten-cli
  draft: false
  prerelease: auto

# Publishes Formula/baseten.rb to the basetenlabs/homebrew-baseten tap on each
# release. Uses the deprecated `brews` (formula) rather than `homebrew_casks`
# because the formula installs on both macOS and Linuxbrew.
brews:
  - name: baseten
    repository:
      owner: basetenlabs
      name: homebrew-baseten
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/basetenlabs/baseten-cli"
    description: "CLI for the Baseten Inference Platform"
    license: MIT
    skip_upload: auto
    test: |
      system "#{bin}/baseten", "--version"

