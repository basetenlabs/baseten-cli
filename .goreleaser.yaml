version: 2

project_name: baseten

before:
  hooks:
    - go mod tidy
    - sh -c 'go run ./cmd/docs --cli-version={{ .Version }} --out=docs.json'

builds:
  - id: baseten
    main: ./cmd/baseten
    binary: baseten
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/basetenlabs/baseten-cli/internal/cmd.Version={{.Version}}

archives:
  - id: baseten
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  github:
    owner: basetenlabs
    name: baseten-cli
  draft: false
  prerelease: auto
  extra_files:
    - glob: docs.json

