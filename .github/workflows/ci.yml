name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # TODO: Remove GOPRIVATE and the git config step below once baseten-go
    # is open source. After that, the Go module proxy can fetch it directly.
    env:
      GOPRIVATE: github.com/basetenlabs/*
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # TODO: Remove once baseten-go is open source.
      - name: Configure private Go module access
        run: |
          git config --global url."https://x-access-token:${{ secrets.TEMP_PRIVATE_REPO_SECRET }}@github.com/".insteadOf "https://github.com/"

      - name: Lint
        run: |
          go mod tidy
          go fmt ./...
          git diff --exit-code

      - name: Test
        run: go test ./...

      - name: E2E test
        if: matrix.os == 'ubuntu-latest'
        env:
          # Forks won't have these secrets so e2e tests skip, but pushes
          # to main will run them.
          BASETEN_E2E_TEST_API_KEY: ${{ secrets.BASETEN_E2E_TEST_API_KEY }}
          BASETEN_E2E_TEST_REMOTE_URL: ${{ secrets.BASETEN_E2E_TEST_REMOTE_URL }}
        run: go test -tags=e2e ./internal/e2e-tests/...
