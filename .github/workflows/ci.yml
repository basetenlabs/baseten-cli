name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint
        run: |
          go mod tidy
          go fmt ./...
          git diff --exit-code

      - name: Test
        run: go test ./...

      - name: Emit docs.json (smoke)
        if: matrix.os == 'ubuntu-latest'
        run: |
          go run ./cmd/docs --cli-version=ci --out=/tmp/docs.json
          python3 -c "import json,sys; json.load(open('/tmp/docs.json')); print('valid JSON, $(wc -c < /tmp/docs.json) bytes')"

      - name: E2E test
        if: matrix.os == 'ubuntu-latest'
        env:
          # Forks won't have these secrets so e2e tests skip, but pushes
          # to main will run them.
          BASETEN_E2E_TEST_API_KEY: ${{ secrets.BASETEN_E2E_TEST_API_KEY }}
          BASETEN_E2E_TEST_REMOTE_URL: ${{ secrets.BASETEN_E2E_TEST_REMOTE_URL }}
        run: go test -tags=e2e -timeout 30m ./internal/e2e-tests/...
